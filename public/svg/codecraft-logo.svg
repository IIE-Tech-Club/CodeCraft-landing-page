<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .circuit { fill: none; stroke: #00d9ff; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .circuit-dot { fill: #00d9ff; }
      .gear { fill: none; stroke: #ff8a3d; stroke-width: 10; stroke-linecap: round; }
      .gear-fill { fill: #ff8a3d; }
    </style>
  </defs>
  
  <!-- Left C - Circuit Board Style -->
  <g transform="translate(60, 100)">
    <!-- Main C outline -->
    <path class="circuit" d="M 35,-50 Q 70,-50 70,-20 L 70,20 Q 70,50 35,50 Q 0,50 0,20" stroke-width="11"/>
    
    <!-- Circuit traces -->
    <line class="circuit" x1="-5" y1="-35" x2="-25" y2="-35" stroke-width="4"/>
    <circle class="circuit-dot" cx="-28" cy="-35" r="3"/>
    
    <line class="circuit" x1="-5" y1="0" x2="-28" y2="0" stroke-width="4"/>
    <circle class="circuit-dot" cx="-31" cy="0" r="3"/>
    
    <line class="circuit" x1="-5" y1="35" x2="-25" y2="35" stroke-width="4"/>
    <circle class="circuit-dot" cx="-28" cy="35" r="3"/>
    
    <!-- Interior traces -->
    <line class="circuit" x1="15" y1="-20" x2="30" y2="-20" stroke-width="3"/>
    <line class="circuit" x1="30" y1="-20" x2="30" y2="5" stroke-width="3"/>
    <line class="circuit" x1="30" y1="5" x2="15" y2="5" stroke-width="3"/>
    
    <line class="circuit" x1="15" y1="15" x2="30" y2="15" stroke-width="3"/>
    <line class="circuit" x1="30" y1="15" x2="30" y2="30" stroke-width="3"/>
    <line class="circuit" x1="30" y1="30" x2="15" y2="30" stroke-width="3"/>
  </g>
  
  <!-- Right C - Gear Style -->
  <g transform="translate(180, 100)">
    <!-- Main C outline -->
    <path class="gear" d="M 40,-50 Q 75,-50 75,-18 L 75,18 Q 75,50 40,50 Q 5,50 5,18" stroke-width="9"/>
    
    <!-- Large gear teeth -->
    <rect class="gear-fill" x="74" y="-40" width="14" height="18" rx="2"/>
    <rect class="gear-fill" x="74" y="-18" width="14" height="16" rx="2"/>
    <rect class="gear-fill" x="74" y="8" width="14" height="16" rx="2"/>
    <rect class="gear-fill" x="74" y="32" width="14" height="18" rx="2"/>
    
    <!-- Circular gear patterns -->
    <circle class="gear" cx="40" cy="0" r="15" stroke-width="2.5"/>
    <circle class="gear" cx="40" cy="0" r="25" stroke-width="2.5"/>
    
    <!-- Gear grooves -->
    <path class="gear" d="M 24,-28 Q 28,-32 32,-28" stroke-width="2.5"/>
    <path class="gear" d="M 24,0 Q 28,-4 32,0" stroke-width="2.5"/>
    <path class="gear" d="M 24,28 Q 28,32 32,28" stroke-width="2.5"/>
  </g>
</svg>